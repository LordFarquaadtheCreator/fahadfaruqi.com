name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - run: npm ci
      - name: Build WASM
        working-directory: interpreter
        run: GOOS=js GOARCH=wasm go build -o ../static/interp.wasm .
      - run: npm run build
      - uses: actions/configure-pages@v6
      - name: Delete stale github-pages artifacts
        run: |
          artifacts=$(gh api repos/${{ github.repository }}/actions/artifacts --paginate -q '.artifacts[] | select(.name=="github-pages") | .url' 2>/dev/null || true)
          for url in $artifacts; do
            gh api -X DELETE "$url" || true
          done
        env:
          GH_TOKEN: ${{ github.token }}
      - uses: actions/upload-pages-artifact@v4
        with:
          path: ./build
      - id: deployment
        uses: actions/deploy-pages@v5